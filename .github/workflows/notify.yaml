name: WePlay Version Check

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'
      
      - name: Restore version state
        uses: actions/cache@v4.2.3
        with:
          path: last_version.json
          key: version-state-${{ github.run_id }}
          restore-keys: version-state-
      
      - name: Check version and notify
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          APP_ID: "1580330718"
        run: |
          python appstore_version_webhook.py \
            --app-id "$APP_ID" \
            --webhook-url "$WEBHOOK_URL"
      
      - name: Save version state
        uses: actions/cache@v4.2.3
        with:
          path: last_version.json
          key: version-state-${{ github.run_id }}
